; PlatformIO Project Configuration File - Root (Monorepo)
; =======================================================
; M360 Horta IoT agricultural monitoring system.
; Main configuration for Gateway and Sensor/Actuator Nodes.
; Docs: https://docs.platformio.org/

[platformio]
default_envs = d1_mini_libdry, nano_01nodeSolo3d, ProMini_04nodeClima, nano_99_reles_nano, nano_13nodeZTS_UmidadeHall, nano_80nodeAqua


src_dir = src
lib_dir = lib

; ===== FLAGS COMUNS =====
[common]
flags =
    -D MY_BAUD_RATE=115200
    -D MY_RADIO_RF24
    -D MY_RF24_DATARATE=RF24_250KBPS
    -D MY_RF24_PA_LEVEL=RF24_PA_HIGH
    -D MY_REBOOT_FEATURE
    ; MY_RADIO_TIMEOUT_MS NÃO vai aqui — impacta nós LOW_POWER. Defina por env.
monitor_speed = 115200

; ===== VERIFICAÇÃO ESTÁTICA — biblioteca M360-DRY =====
; Executar: pio check -e check_m360_dry
; A build falha se cppcheck reportar erros (error/warning level).
[env:check_m360_dry]
platform = atmelavr
board = pro8MHzatmega328
framework = arduino
lib_deps =
    mysensors/MySensors@^2.3.2
build_src_filter = +<../lib/M360-DRY/src/*>
check_tool = cppcheck
check_severity = medium, high
check_flags =
    cppcheck: --enable=warning,style,performance,portability
              --suppress-xml=lib/M360-DRY/cppcheck-suppressions.cfg
              --inline-suppr
              --std=c++11
check_skip_packages = yes

; =======================================================
; ENV: GATEWAY COM LIB DRY (ESP8266 D1 Mini)
; =======================================================
[env:d1_mini_libdry]
; Idêntico a d1_mini, mas usa libDryGatewayMqtt.cpp (com M360::M360Gateway)
; em vez de newGatewayMqtt.cpp. Útil para validar a integração da LibDRY.
platform = espressif8266@2.6.3
board = d1_mini
framework = arduino
build_src_filter =
    +<DRY/gateway/withLibDRY/*.cpp>
    +<DRY/gateway/ngm/*.cpp>

monitor_port = COM5
upload_port = COM5
upload_speed = 115200
monitor_speed = ${common.monitor_speed}

board_build.filesystem = littlefs
upload_resetmethod = nodemcu
upload_flags =
    --before=default_reset
    --after=hard_reset

lib_deps =
    mysensors/MySensors@^2.3.2
    bblanchon/ArduinoJson@^6.21.3
    knolleary/PubSubClient@^2.8

build_flags =
    ${common.flags}
    -D MQTT_MAX_PACKET_SIZE=512
    -D MY_NODE_ID=0
    -D MY_TRANSPORT_WAIT_READY_MS=1
    -D MY_GATEWAY_FEATURE
    -D MY_RF24_CE_PIN=2
    -D MY_RF24_CSN_PIN=15
    -D MY_TRANSPORT_DISCOVERY_TIMEOUT=60000
    -D MY_TRANSPORT_SANITY_CHECK_INTERVAL_MS=30000
    -D MY_OTA_LOG_SENDER_FEATURE

; =======================================================
; ENV: NÓ CENTRAL DE ATUAÇÃO ESTUFA (Arduino Nano ATmega328)
; Nó 99 — nodeReles
; Hardware: Arduino Nano + MUX CD74HC4067 + 16 Relés 10A
; Canais MUX (D3=SIG, D4-D7=S0-S3): Sol.A/B/C, Perist.SuplA/B, pH+/pH-
; Pinos Nativos (concorrentes): D2=BombaNFT, D8=BombaOxi
; =======================================================
[env:nano_01nodeSolo3d]
extends = common
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps =
	mysensors/MySensors@^2.3.2
build_flags = 
	${common.flags}
	-D MY_NODE_ID=1
build_src_filter = +<DRY/nos/01nodeSolo3D/withLibDRY/>

[env:ProMini_01nodeSolo3d]
extends = common
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
upload_speed = 57600
lib_deps =
	mysensors/MySensors@^2.3.2
build_flags = 
	${common.flags}
	-D MY_NODE_ID=1
	-D MY_DEBUG
build_src_filter = +<DRY/nos/01nodeSolo3d/withLibDRY/>

[env:ProMini_04nodeClima]
extends = common
platform = atmelavr
board = pro8MHzatmega328
framework = arduino
lib_deps =
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit Unified Sensor@^1.1.14
build_flags = 
	${common.flags}
	-D MY_NODE_ID=4
	-D MY_SIGNAL_REPORT_ENABLED
build_src_filter = +<DRY/nos/04nodeClima/withLibDRY/>

[env:nano_99_reles_nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_src_filter =
    +<DRY/nos/99nodeReles/withLibDRY/*.cpp>

monitor_speed = ${common.monitor_speed}
upload_port = COM4
monitor_port = COM4

lib_deps =
    mysensors/MySensors@^2.3.2

build_flags =
    ${common.flags}
    -D MY_NODE_ID=99
    -D MY_DEBUG
    -D MY_RADIO_TIMEOUT_MS=500
    -Isrc/DRY/nos/99nodeReles/withLibDry
; =======================================================
; ENV: NÓ ZTS UMIDADE HALL (Arduino Nano ATmega328)
; =======================================================
[env:nano_13nodeZTS_UmidadeHall]
extends = common
platform = atmelavr
board = nanoatmega328
framework = arduino
build_src_filter = 
    +<DRY/nos/13nodeZTS_UmidadeHall/withLibDRY/*.cpp>

monitor_speed = ${common.monitor_speed}

lib_deps =
    mysensors/MySensors@^2.3.2

build_flags =
    ${common.flags}
    -D MY_NODE_ID=13
    -D MY_RF24_CE_PIN=6
    -D MY_RF24_CSN_PIN=4
    -Isrc/DRY/nos/13nodeZTS_UmidadeHall/withLibDRY

; =======================================================
; ENV: NÓ MONITORAMENTO CAIXA DE AGUA (Arduino Nano ATmega328)
; =======================================================
[env:nano_80nodeAqua]
extends = common
platform = atmelavr
board = nanoatmega328
framework = arduino
build_src_filter = 
    +<DRY/nos/80nodeAqua/withLibDRY/*.cpp>

monitor_speed = ${common.monitor_speed}

lib_deps =
    mysensors/MySensors@^2.3.2
    milesburton/DallasTemperature@^3.9.1
    paulstoffregen/OneWire@^2.3.7

build_flags =
    ${common.flags}
    -D MY_NODE_ID=80
    -Isrc/DRY/nos/80nodeAqua/withLibDRY

