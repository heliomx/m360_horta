<svg width="900" height="740" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="740" fill="#f0f4f8"/>
  
  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">
    Diagrama de Blocos — Nó 01 (Monitoramento 3D de Solo)
  </text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#555">
    Arduino Nano + CD74HC4067 + NRF24L01 + 18 Sensores Resistivos (Cabos Ethernet Blindados)
  </text>

  <!-- DEFS -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0055aa"/>
    </marker>
  </defs>

  <!-- ALIMENTAÇÃO -->
  <rect x="310" y="65" width="280" height="60" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="450" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5000">⚡ ALIMENTAÇÃO (FONTE FIXA)</text>
  <text x="450" y="105" text-anchor="middle" font-size="10.5" fill="#7a5000">5V DC (Arduino &amp; MUX) · 3.3V DC Regulador (NRF24L01)</text>

  <!-- ARDUINO NANO -->
  <rect x="310" y="170" width="280" height="280" rx="6" fill="#e3f0ff" stroke="#0055aa" stroke-width="2.5"/>
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#003080">ARDUINO NANO</text>
  <text x="450" y="213" text-anchor="middle" font-size="11" fill="#003080">ATmega328P — 5V / 16MHz</text>

  <line x1="320" y1="222" x2="580" y2="222" stroke="#0055aa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Pino Controle Energia -->
  <text x="325" y="245" font-size="10" fill="#003080" font-weight="bold">D3</text>
  <text x="345" y="245" font-size="10" fill="#444">→ Energia temporária (Prevenção Eletrólise)</text>

  <!-- Controle MUX -->
  <text x="325" y="275" font-size="10" fill="#003080" font-weight="bold">D4–D7</text>
  <text x="365" y="275" font-size="10" fill="#444">→ S0 a S3 (Controle Multiplexador)</text>

  <!-- Sinal MUX -->
  <text x="325" y="305" font-size="10" fill="#003080" font-weight="bold">A0</text>
  <text x="345" y="305" font-size="10" fill="#444">← SIG (Sinal Multiplexado)</text>

  <!-- Pinos Nativos -->
  <text x="560" y="265" text-anchor="end" font-size="10" fill="#003080" font-weight="bold">A1</text>
  <text x="545" y="265" text-anchor="end" font-size="10" fill="#444">Leitura Nativa 1 (Canteiro B) ←</text>

  <text x="560" y="295" text-anchor="end" font-size="10" fill="#003080" font-weight="bold">A2</text>
  <text x="545" y="295" text-anchor="end" font-size="10" fill="#444">Leitura Nativa 2 (Canteiro B) ←</text>

  <line x1="320" y1="390" x2="580" y2="390" stroke="#0055aa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#444">Modo DRY: ALWAYS_ON (Sem sleep, loop passivo)</text>

  <!-- NRF24L01 -->
  <rect x="345" y="495" width="210" height="95" rx="6" fill="#e8f5e9" stroke="#1a7a3a" stroke-width="2"/>
  <text x="450" y="518" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5c2e">NRF24L01+</text>
  <text x="450" y="534" text-anchor="middle" font-size="10.5" fill="#1a5c2e">Módulo RF 2.4 GHz + Antena</text>
  <line x1="355" y1="542" x2="545" y2="542" stroke="#1a7a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="558" text-anchor="middle" font-size="9.5" fill="#444">CE: D9 | CSN: D10 | SPI: D11–D13</text>
  <text x="450" y="574" text-anchor="middle" font-size="9.5" fill="#444">Alimentação: 3.3V DC (Adaptador)</text>

  <!-- MUX CD74HC4067 -->
  <rect x="30" y="235" width="200" height="120" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="130" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a148c">MULTIPLEXADOR</text>
  <text x="130" y="275" text-anchor="middle" font-size="11" fill="#4a148c">CD74HC4067 (16 Canais)</text>
  <text x="130" y="305" text-anchor="middle" font-size="10" fill="#444">Sinais Analógicos C0 a C15</text>
  <text x="130" y="325" text-anchor="middle" font-size="10" fill="#444">Encaminha 1 sinal ativo para A0</text>

  <!-- SENSORES VIA MUX -->
  <rect x="20" y="420" width="220" height="90" rx="6" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
  <text x="130" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">16 Sensores Resistivos (MUX)</text>
  <text x="130" y="465" text-anchor="middle" font-size="10" fill="#004d40">Canteiro A (9x) + Canteiro B (7x)</text>
  <text x="130" y="485" text-anchor="middle" font-size="9" fill="#004d40">Resistores 10kΩ na Placa (Pull-up p/ D3)</text>

  <!-- SENSORES NATIVOS -->
  <rect x="650" y="235" width="220" height="90" rx="6" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
  <text x="760" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">2 Sensores Resistivos (Nativos)</text>
  <text x="760" y="280" text-anchor="middle" font-size="10" fill="#004d40">Canteiro B (8 e 9)</text>
  <text x="760" y="300" text-anchor="middle" font-size="9" fill="#004d40">Resistores 10kΩ na Placa (Pull-up p/ D3)</text>

  <!-- ======================== CONEXÕES ======================== -->

  <!-- Alimentação -->
  <line x1="450" y1="125" x2="450" y2="170" stroke="#f9a825" stroke-width="2" marker-end="url(#arr)"/>

  <!-- SPI -->
  <line x1="435" y1="450" x2="435" y2="495" stroke="#1a7a3a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="465" y1="495" x2="465" y2="450" stroke="#1a7a3a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="425" y="475" font-size="9" fill="#1a5c2e" font-weight="bold" text-anchor="end">SPI</text>

  <!-- D3 Energia Mitigação -->
  <path d="M 310,240 L 280,240 L 280,480 L 240,480" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M 280,240 L 280,140 L 760,140 L 760,235" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="275" y="235" font-size="9" fill="#7a5000" text-anchor="end">D3 VCC</text>
  <text x="765" y="150" font-size="9" fill="#7a5000">D3 VCC Temp.</text>

  <!-- S0-S3 MUX -->
  <path d="M 310,270 L 230,270" fill="none" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="270" y="265" font-size="9" fill="#6a1b9a">D4-D7</text>

  <!-- A0 MUX SIG -->
  <path d="M 230,300 L 310,300" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="270" y="295" font-size="9" fill="#0055aa">SIG -> A0</text>

  <!-- MUX Canais -> Sensores -->
  <path d="M 130,420 L 130,355" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="135" y="385" font-size="9" fill="#0055aa">C0 a C15 (Sinal)</text>

  <!-- Sensores Nativos -> Arduino -->
  <path d="M 650,260 L 590,260" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M 650,290 L 590,290" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="620" y="255" font-size="9" fill="#0055aa" text-anchor="middle">Sinal A1</text>
  <text x="620" y="285" font-size="9" fill="#0055aa" text-anchor="middle">Sinal A2</text>

  <!-- LEGENDA -->
  <rect x="310" y="625" width="280" height="75" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="642" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#333">LEGENDA DO DIAGRAMA</text>
  <line x1="330" y1="658" x2="365" y2="658" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="375" y="661" font-size="9.5" fill="#333">Alimentação (+5V, +3.3V, Pino Mitigação)</text>
  <line x1="330" y1="676" x2="365" y2="676" stroke="#0055aa" stroke-width="1.5"/>
  <text x="375" y="679" font-size="9.5" fill="#333">Sinal Analógico de Umidade</text>
  <line x1="330" y1="694" x2="365" y2="694" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="375" y="697" font-size="9.5" fill="#333">Controle Lógico (S0 a S3)</text>
</svg>
