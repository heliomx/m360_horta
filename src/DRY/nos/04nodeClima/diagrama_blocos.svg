<svg width="900" height="740" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="740" fill="#f0f4f8"/>
  
  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">
    Diagrama de Blocos — Nó 04 (Clima Geral da Estufa)
  </text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#555">
    Arduino Pro Mini 3.3V + NRF24L01+ + DHT22 + LDR (Alimentação Solar Autônoma)
  </text>

  <!-- DEFS -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- ALIMENTAÇÃO SOLAR -->
  <rect x="310" y="65" width="280" height="100" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="450" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5000">⚡ ALIMENTAÇÃO SOLAR / BATERIA</text>
  <text x="450" y="105" text-anchor="middle" font-size="10.5" fill="#7a5000">Painel Solar 6V/100mA -> TP4056 -> Li-Ion 18650</text>
  <text x="450" y="125" text-anchor="middle" font-size="10.5" fill="#7a5000">Fornece ~3.7V - 4.2V direto para o RAW do Pro Mini</text>
  <text x="450" y="145" text-anchor="middle" font-size="10.5" fill="#7a5000">e 3.3V gerado pelo LDO do Pro Mini para Módulos</text>

  <!-- ARDUINO PRO MINI -->
  <rect x="310" y="210" width="280" height="230" rx="6" fill="#e3f0ff" stroke="#0055aa" stroke-width="2.5"/>
  <text x="450" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#003080">ARDUINO PRO MINI</text>
  <text x="450" y="253" text-anchor="middle" font-size="11" fill="#003080">ATmega328P — 3.3V / 8MHz</text>

  <!-- Pino Controle Energia -->
  <text x="325" y="285" font-size="10" fill="#003080" font-weight="bold">D3</text>
  <text x="345" y="285" font-size="10" fill="#444">→ VCC Controlado (Mitigação Parasita)</text>

  <!-- Sinal Sensores -->
  <text x="325" y="325" font-size="10" fill="#003080" font-weight="bold">D4</text>
  <text x="345" y="325" font-size="10" fill="#444">← Sinal Digital (DHT22)</text>

  <text x="325" y="365" font-size="10" fill="#003080" font-weight="bold">A0</text>
  <text x="345" y="365" font-size="10" fill="#444">← Sinal Analógico (LDR)</text>

  <line x1="320" y1="400" x2="580" y2="400" stroke="#0055aa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#444">Modo DRY: LOW_POWER (smartSleep 15m)</text>

  <!-- NRF24L01 -->
  <rect x="345" y="495" width="210" height="95" rx="6" fill="#e8f5e9" stroke="#1a7a3a" stroke-width="2"/>
  <text x="450" y="518" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5c2e">NRF24L01+</text>
  <text x="450" y="534" text-anchor="middle" font-size="10.5" fill="#1a5c2e">Módulo RF 2.4 GHz + Antena</text>
  <line x1="355" y1="542" x2="545" y2="542" stroke="#1a7a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="558" text-anchor="middle" font-size="9.5" fill="#444">CE: D9 | CSN: D10 | SPI: D11–D13</text>
  <text x="450" y="574" text-anchor="middle" font-size="9.5" fill="#444">Alimentação: 3.3V DC (Direto do Pro Mini VCC)</text>

  <!-- DHT22 -->
  <rect x="30" y="260" width="180" height="70" rx="6" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
  <text x="120" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">DHT22</text>
  <text x="120" y="300" text-anchor="middle" font-size="10" fill="#004d40">Temp &amp; Umidade (Ar)</text>
  <text x="120" y="320" text-anchor="middle" font-size="9" fill="#004d40">Puxa energia do D3</text>

  <!-- LDR -->
  <rect x="30" y="340" width="180" height="70" rx="6" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
  <text x="120" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">LDR (Divisor Tensão)</text>
  <text x="120" y="380" text-anchor="middle" font-size="10" fill="#004d40">Luminosidade (Estufa)</text>
  <text x="120" y="400" text-anchor="middle" font-size="9" fill="#004d40">Puxa energia do D3, Resistor 10k GND</text>

  <!-- ======================== CONEXÕES ======================== -->

  <!-- Alimentação -->
  <line x1="450" y1="165" x2="450" y2="210" stroke="#f9a825" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="190" font-size="9" fill="#7a5000" font-weight="bold">Bateria RAW</text>

  <!-- SPI / Rádio -->
  <line x1="435" y1="440" x2="435" y2="495" stroke="#1a7a3a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="465" y1="495" x2="465" y2="440" stroke="#1a7a3a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="425" y="475" font-size="9" fill="#1a5c2e" font-weight="bold" text-anchor="end">SPI/CE/CSN</text>

  <!-- D3 Energia Mitigação -->
  <path d="M 310,280 L 250,280 L 250,300 L 210,300" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M 250,280 L 250,375 L 210,375" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="255" y="275" font-size="9" fill="#7a5000">VCC Switch (D3)</text>

  <!-- D4 Sinal DHT22 -->
  <path d="M 210,280 L 310,280" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="255" y="275" font-size="9" fill="#0055aa">Sinal DHT22 (D4)</text>
  <!-- Oops, text overlap. I will just rely on the labels inside the boxes. -->

  <path d="M 210,320 L 310,320" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 210,360 L 310,360" fill="none" stroke="#0055aa" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
