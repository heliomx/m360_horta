<?xml version="1.0"?>
<!--
  cppcheck-suppressions.cfg — Supressões para a biblioteca M360-DRY
  Uso: cppcheck - -suppressions-list=cppcheck-suppressions.cfg src/

  Regra: suprimir SOMENTE falsos positivos documentados.
  Não suprimir erros reais — a build deve falhar nesse caso.
-->
<suppressions>

  <!--
    missingInclude: MySensors.h e Arduino.h são resolvidos pelo ambiente
    PlatformIO/Arduino e não estão no include path do cppcheck standalone.
  -->
  <suppress>
    <id>missingInclude</id>
  </suppress>

  <!--
    missingIncludeSystem: mesmo motivo acima para headers de sistema AVR
    (<avr/io.h>, <avr/interrupt.h>, etc.)
  -->
  <suppress>
    <id>missingIncludeSystem</id>
  </suppress>

  <!--
    unusedFunction: callbacks fracos (m360_powerUp/Down) são weak symbols;
    cppcheck não reconhece __attribute__((weak)) como "usado".
  -->
  <suppress>
    <id>unusedFunction</id>
    <fileName>M360Power.cpp</fileName>
  </suppress>

  <!--
    preprocessorErrorDirective: #ifdef M360_POWER_ALWAYS_ON /
    M360_POWER_LOW_POWER são definidos pelo nó, não pela lib —
    cppcheck vê blocos #else como código morto quando analisa isolado.
  -->
  <suppress>
    <id>preprocessorErrorDirective</id>
  </suppress>

</suppressions>
